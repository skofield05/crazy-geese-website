# GitHub Actions Workflow
# Aktualisiert die Vereinsdaten automatisch von der ABF-Seite
# Saison 2026 - Läuft an Spieltagen + Folgetagen
#
# Saison Mai–Sep ist immer MESZ (UTC+2):
#   Spieltag 18:00–23:00 MESZ -> 16:00–21:00 UTC (6 Läufe pro Spieltag)
#   Folgetag 06:00–10:00 MESZ -> 04:00–08:00 UTC (5 Läufe pro Folgetag)

name: Update Standings

on:
  # Manueller Trigger (für Tests)
  workflow_dispatch:

  schedule:
    # === SPIELTAG: stündlich 18–23 MESZ (= 16–21 UTC) ===
    # Spieltage 03.05., 16.05., 23.05.
    - cron: '0 16-21 3,16,23 5 *'
    # Spieltage 13.06., 20.06.
    - cron: '0 16-21 13,20 6 *'
    # Spieltag 19.07.
    - cron: '0 16-21 19 7 *'
    # Spieltage 02.08., 15.08.
    - cron: '0 16-21 2,15 8 *'
    # Playoffs 05./06./12./13.09.
    - cron: '0 16-21 5,6,12,13 9 *'

    # === FOLGETAG: stündlich 06–10 MESZ (= 04–08 UTC) ===
    # nach 03.05. (-> 04.05.), nach 16.05. (-> 17.05.), nach 23.05. (-> 24.05.)
    - cron: '0 4-8 4,17,24 5 *'
    # nach 13.06. (-> 14.06.), nach 20.06. (-> 21.06.)
    - cron: '0 4-8 14,21 6 *'
    # nach 19.07. (-> 20.07.)
    - cron: '0 4-8 20 7 *'
    # nach 02.08. (-> 03.08.), nach 15.08. (-> 16.08.)
    - cron: '0 4-8 3,16 8 *'
    # nach Playoffs (-> 07.09., 14.09.)
    - cron: '0 4-8 7,14 9 *'

# WICHTIG: Schreibrechte für git push
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run Scraper
        run: python scripts/scraper.py

      - name: Validate data.json
        # Gate: Wenn der Scraper kaputtes JSON geschrieben hat, hier abbrechen,
        # bevor ICS regeneriert oder committet wird.
        run: python scripts/validate_data.py

      - name: Regenerate ICS
        run: python scripts/generate_ics.py

      - name: Check for Changes
        id: changes
        run: |
          git diff --quiet data/data.json data/crazy-geese-*.ics || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/data.json data/crazy-geese-*.ics
          git commit -m "Update Standings $(date +'%Y-%m-%d %H:%M')"
          git push
